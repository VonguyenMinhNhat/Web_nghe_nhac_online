<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveBeat - Tài khoản</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand simple-brand">
                    <div class="brand-copy">
                        <h1>WaveBeat</h1>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="menu-item nav-link" href="/pages/dashboard.html">Trang chính</a>
                <a class="menu-item nav-link" href="/pages/playlists.html">Playlist</a>
                <a class="menu-item nav-link" href="/pages/admin.html">Quản trị</a>
            </nav>
        </aside>

        <main class="content">
            <section class="topbar">
                <div class="topbar-left">
                    <h2>Quản lý tài khoản</h2>
                </div>
                <div class="topbar-right">
                    <a class="top-action" href="/pages/dashboard.html">Nghe nhạc</a>
                    <a class="top-action" href="/pages/playlists.html">Playlist</a>
                    <a class="top-action accent-chip" href="/pages/account.html">Tài khoản</a>
                </div>
            </section>

            <section class="content-grid account-grid">
                <section class="panel">
                    <p class="panel-title">Đăng nhập / Đăng ký</p>
                    <div class="form-grid compact-grid">
                        <input id="authUsername" type="text" placeholder="Username">
                        <input id="authFullName" type="text" placeholder="Họ tên">
                        <input id="authEmail" type="email" placeholder="Email">
                        <input id="authPassword" type="password" placeholder="Mật khẩu">
                        <button id="registerBtn" type="button">Đăng ký</button>
                        <button id="loginBtn" type="button">Đăng nhập</button>
                        <button id="logoutBtn" type="button">Đăng xuất</button>
                    </div>
                    <div class="form-grid compact-grid secondary-block">
                        <input id="forgotEmail" type="email" placeholder="Email quên mật khẩu">
                        <button id="forgotBtn" type="button">Lấy mã reset</button>
                        <input id="resetCode" type="text" placeholder="Reset code">
                        <input id="resetPassword" type="password" placeholder="Mật khẩu mới">
                        <button id="resetBtn" type="button">Đặt lại mật khẩu</button>
                    </div>
                </section>

                <section class="panel">
                    <p class="panel-title">Hồ sơ</p>
                    <div class="form-grid compact-grid">
                        <input id="profileUsername" type="text" placeholder="Username">
                        <input id="profileFullName" type="text" placeholder="Họ tên">
                        <input id="profileEmail" type="email" placeholder="Email">
                        <button id="updateProfileBtn" type="button">Cập nhật</button>
                    </div>
                    <div class="form-grid compact-grid secondary-block">
                        <input id="currentPassword" type="password" placeholder="Mật khẩu hiện tại">
                        <input id="newPassword" type="password" placeholder="Mật khẩu mới">
                        <button id="changePasswordBtn" type="button">Đổi mật khẩu</button>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <div id="loadingIndicator" class="loading-indicator" aria-live="polite">Đang tải...</div>
    <div id="toastContainer" class="toast-container"></div>

    <footer class="player-bar">
        <div class="player-now">
            <div class="cover-art waveform-box" id="coverArt">WB</div>
            <div>
                <strong id="nowPlayingTitle">Chưa chọn bài hát</strong>
                <p id="nowPlayingMeta">Chọn bài để bắt đầu</p>
            </div>
        </div>
        <div class="player-controls">
            <button id="prevBtn" type="button">Trước</button>
            <button id="playBtn" type="button" class="play-btn">Phát</button>
            <button id="nextBtn" type="button">Tiếp</button>
        </div>
        <div class="progress-wrap">
            <span id="currentTime">00:00</span>
            <input id="progressBar" type="range" min="0" max="100" value="0">
            <span id="duration">00:00</span>
        </div>
        <div class="volume-wrap">
            <button id="muteBtn" type="button">Tắt tiếng</button>
            <input id="volumeBar" type="range" min="0" max="1" step="0.01" value="0.5">
        </div>
    </footer>

    <audio id="audioPlayer" preload="metadata"></audio>
    <script src="/app.js"></script>
</body>
</html>
